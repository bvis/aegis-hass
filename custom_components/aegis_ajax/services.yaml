force_arm:
  name: Force arm
  description: Arm the system ignoring open sensors and active alarms.
  target:
    entity:
      domain: alarm_control_panel
      integration: aegis_ajax
  fields:
    entity_id:
      name: Entity
      description: Alarm panel entity to force arm. If omitted, arms all panels.
      required: false
      selector:
        entity:
          domain: alarm_control_panel
          integration: aegis_ajax

force_arm_night:
  name: Force arm night mode
  description: Arm night mode ignoring open sensors and active alarms.
  target:
    entity:
      domain: alarm_control_panel
      integration: aegis_ajax
  fields:
    entity_id:
      name: Entity
      description: Alarm panel entity to force arm night. If omitted, arms all panels.
      required: false
      selector:
        entity:
          domain: alarm_control_panel
          integration: aegis_ajax

disarm_night_mode:
  name: Disarm night mode
  description: >-
    Exit night mode while leaving any independently armed (away) groups
    armed. Unlike a full disarm, this only stands down the night-mode
    groups — the native Ajax "disarm night mode" operation.
  target:
    entity:
      domain: alarm_control_panel
      integration: aegis_ajax
  fields:
    entity_id:
      name: Entity
      description: Alarm panel entity for the space to disarm from night mode. If omitted, applies to all panels.
      required: false
      selector:
        entity:
          domain: alarm_control_panel
          integration: aegis_ajax

press_panic_button:
  name: Press panic button (SOS)
  description: >-
    Trigger the Ajax SOS / panic button on a space. This calls the same
    endpoint as the red panic button in the official Ajax mobile app and
    forwards a Panic / Hold-up alarm to your monitoring station (CRA),
    which on most contracts triggers police dispatch immediately and
    bypasses verification windows. Use only for genuine emergencies — false
    panic alarms can have legal and financial consequences. The `confirm`
    field must be set to true or the call is rejected.
  target:
    entity:
      domain: alarm_control_panel
      integration: aegis_ajax
  fields:
    confirm:
      name: Confirm panic
      description: >-
        Must be set to true. Acts as a safety lock to prevent automations
        from triggering this service accidentally.
      required: true
      example: true
      selector:
        boolean:
    entity_id:
      name: Entity
      description: >-
        Alarm panel entity for the space whose panic button to press. If
        omitted, the panic is sent to every space configured in the
        integration.
      required: false
      selector:
        entity:
          domain: alarm_control_panel
          integration: aegis_ajax
    latitude:
      name: Latitude
      description: >-
        Optional caller latitude forwarded to Ajax. Use with longitude.
      required: false
      example: 40.4168
      selector:
        number:
          min: -90
          max: 90
          step: any
          mode: box
    longitude:
      name: Longitude
      description: >-
        Optional caller longitude forwarded to Ajax. Use with latitude.
      required: false
      example: -3.7038
      selector:
        number:
          min: -180
          max: 180
          step: any
          mode: box

set_photo_on_demand_mode:
  name: Set Photo on Demand mode
  description: >-
    Enable or disable Photo on Demand mode on a hub. Two independent
    channels can be toggled separately — `user` (whether hub users can
    request photos on demand from the Ajax app) and `scenario` (whether
    scenarios / automations can trigger captures). Leave a field unset to
    keep its current value. At least one of the two is required.
  target:
    entity:
      domain: alarm_control_panel
      integration: aegis_ajax
  fields:
    user:
      name: User requests
      description: >-
        When set, enables or disables on-demand photo requests initiated
        by hub users. Leave unset to keep the current value.
      required: false
      selector:
        boolean:
    scenario:
      name: Scenarios
      description: >-
        When set, enables or disables Photo on Demand captures triggered
        by Ajax scenarios / automations. Leave unset to keep the current
        value.
      required: false
      selector:
        boolean:
    entity_id:
      name: Entity
      description: >-
        Alarm panel entity for the space whose hub mode to update. If
        omitted, applies to every configured space.
      required: false
      selector:
        entity:
          domain: alarm_control_panel
          integration: aegis_ajax
