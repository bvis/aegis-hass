###############################################################################
# Aegis for Ajax — Lovelace Dashboard Tab
#
# A professional, clean alarm dashboard using standard HA cards.
# Add this as a view/tab in your Lovelace configuration.
#
# Optional: Install mushroom cards (via HACS) for a more polished look.
# The dashboard works without mushroom cards — just uses standard cards.
#
# Entity naming follows the aegis_ajax integration conventions.
# Adjust entity IDs if your HA slugifies device names differently.
###############################################################################

title: Security
path: security
icon: mdi:shield-home
type: sections
max_columns: 3
sections:

  # ═══════════════════════════════════════════════════════════════════════════
  # SECTION 1: Alarm Control + System Status
  # ═══════════════════════════════════════════════════════════════════════════
  - title: Alarm Control
    cards:
      # ─── Main Alarm Panel ───
      - type: alarm-panel
        entity: alarm_control_panel.my_hub
        states:
          - arm_away
          - arm_night
          - arm_home

      # ─── System Health at a Glance ───
      - type: entities
        title: System Status
        icon: mdi:server-network
        show_header_toggle: false
        entities:
          - entity: binary_sensor.my_hub_connectivity
            name: Hub Online
            icon: mdi:server-network
          - entity: binary_sensor.my_hub_cra_connection
            name: CRA Monitoring
            icon: mdi:shield-check
          - entity: binary_sensor.my_hub_cellular_connected
            name: Cellular Connection
            icon: mdi:signal-4g
          - entity: sensor.my_hub_mobile_network_type
            name: Mobile Network Type
            icon: mdi:cellphone-wireless
          - entity: sensor.my_hub_battery
            name: Hub Battery
            icon: mdi:battery
          - entity: binary_sensor.my_hub_lid_opened
            name: Hub Lid
            icon: mdi:box-shadow
          - entity: sensor.my_hub_imei
            name: IMEI
            icon: mdi:sim

      # ─── Hub Network Status ───
      - type: entities
        title: Hub Network
        icon: mdi:lan
        show_header_toggle: false
        entities:
          - entity: binary_sensor.my_hub_ethernet
            name: Ethernet
            icon: mdi:ethernet
          - entity: sensor.my_hub_ethernet_ip
            name: IP Ethernet
            icon: mdi:ip-network
          - entity: sensor.my_hub_ethernet_gateway
            name: Gateway
            icon: mdi:router-network
          - entity: sensor.my_hub_ethernet_dns
            name: DNS
            icon: mdi:dns
          - entity: binary_sensor.my_hub_wifi_connected
            name: Wi-Fi
            icon: mdi:wifi
          - entity: sensor.my_hub_wifi_ssid
            name: SSID
            icon: mdi:wifi-settings
          - entity: sensor.my_hub_wifi_signal_level
            name: Wi-Fi Signal
            icon: mdi:wifi-strength-3
          - entity: binary_sensor.my_hub_mains_power
            name: Mains Power
            icon: mdi:power-plug
          - entity: sensor.my_hub_cellular_signal
            name: Cellular Signal
            icon: mdi:signal-cellular-3
          - entity: sensor.my_hub_cellular_network
            name: Cellular Network
            icon: mdi:cellphone-wireless
          - entity: sensor.my_hub_connection_type
            name: Primary Connection
            icon: mdi:connection

  # ═══════════════════════════════════════════════════════════════════════════
  # SECTION 2: Doors & Windows
  # ═══════════════════════════════════════════════════════════════════════════
  - title: Doors & Windows
    cards:
      # ─── Door/Window Status Grid ───
      - type: glance
        title: Current Status
        show_state: true
        columns: 3
        entities:
          - entity: binary_sensor.main_door_door
            name: Main Door
            icon: mdi:door
          - entity: binary_sensor.kitchen_door_door
            name: Kitchen Door
            icon: mdi:door
          - entity: binary_sensor.bedroom_door_door
            name: Bedroom Door
            icon: mdi:door
          - entity: binary_sensor.bedroom_window_door
            name: Bedroom Window
            icon: mdi:window-closed-variant
          - entity: binary_sensor.bedroom2_window_door
            name: Bedroom 2 Window
            icon: mdi:window-closed-variant
          - entity: binary_sensor.dressing_window_door
            name: Dressing Window
            icon: mdi:window-closed-variant

      # ─── Batteries for Door/Window Sensors ───
      - type: glance
        title: Sensor Batteries
        show_state: true
        columns: 3
        entities:
          - entity: sensor.main_door_battery
            name: Door
          - entity: sensor.kitchen_door_battery
            name: Kitchen
          - entity: sensor.bedroom_door_battery
            name: Bedroom
          - entity: sensor.bedroom_window_battery
            name: Bed. Win
          - entity: sensor.bedroom2_window_battery
            name: Bed. 2 Win
          - entity: sensor.dressing_window_battery
            name: Dress. Win

  # ═══════════════════════════════════════════════════════════════════════════
  # SECTION 3: Cameras & Motion
  # ═══════════════════════════════════════════════════════════════════════════
  - title: Cameras & Motion
    cards:
      # ─── Camera Feeds ───
      - type: picture-entity
        entity: camera.hallway_camera
        name: Hallway
        camera_view: auto
        show_state: true

      - type: picture-entity
        entity: camera.dining_camera
        name: Living
        camera_view: auto
        show_state: true

      # ─── Photo Capture Buttons ───
      - type: horizontal-stack
        cards:
          - type: button
            entity: button.hallway_capture_photo
            name: Photo Hallway
            icon: mdi:camera
            tap_action:
              action: call-service
              service: button.press
              target:
                entity_id: button.hallway_capture_photo
            show_state: false

          - type: button
            entity: button.dining_capture_photo
            name: Photo Living
            icon: mdi:camera
            tap_action:
              action: call-service
              service: button.press
              target:
                entity_id: button.dining_capture_photo
            show_state: false

      # ─── Motion Sensor Details ───
      - type: entities
        title: Motion Detectors
        show_header_toggle: false
        entities:
          - entity: binary_sensor.hallway_motion
            name: Hallway
            icon: mdi:motion-sensor
          - entity: sensor.hallway_battery
            name: Hallway Battery
          - entity: binary_sensor.dining_motion
            name: Living
            icon: mdi:motion-sensor
          - entity: sensor.dining_battery
            name: Living Battery

  # ═══════════════════════════════════════════════════════════════════════════
  # SECTION 4: Temperatures
  # ═══════════════════════════════════════════════════════════════════════════
  - title: Temperatures
    cards:
      # ─── Temperature Glance ───
      - type: glance
        title: Temperature by Zone
        show_state: true
        columns: 3
        entities:
          - entity: sensor.kitchen_door_temperature
            name: Kitchen
            icon: mdi:thermometer
          - entity: sensor.bedroom_door_temperature
            name: Bedroom
            icon: mdi:thermometer
          - entity: sensor.main_door_temperature
            name: Entrance
            icon: mdi:thermometer
          - entity: sensor.bedroom_window_temperature
            name: Bed. (win)
            icon: mdi:thermometer
          - entity: sensor.bedroom2_window_temperature
            name: Bed. 2 (win)
            icon: mdi:thermometer
          - entity: sensor.dressing_window_temperature
            name: Dressing
            icon: mdi:thermometer
          - entity: sensor.hallway_temperature
            name: Hallway
            icon: mdi:thermometer
          - entity: sensor.dining_temperature
            name: Living
            icon: mdi:thermometer
          - entity: sensor.keypad_temperature
            name: Keypad
            icon: mdi:thermometer

      # ─── Temperature History Graph ───
      - type: history-graph
        title: 24h History
        hours_to_show: 24
        entities:
          - entity: sensor.kitchen_door_temperature
            name: Kitchen
          - entity: sensor.bedroom_door_temperature
            name: Bedroom
          - entity: sensor.main_door_temperature
            name: Entrance
          - entity: sensor.hallway_temperature
            name: Hallway
          - entity: sensor.dining_temperature
            name: Living

  # ═══════════════════════════════════════════════════════════════════════════
  # SECTION 5: Security Details & Diagnostics
  # ═══════════════════════════════════════════════════════════════════════════
  - title: Security & Diagnostics
    cards:
      # ─── Tamper Status ───
      - type: entities
        title: Tamper Status
        icon: mdi:shield-alert
        show_header_toggle: false
        entities:
          - entity: binary_sensor.main_door_tamper
            name: Main Door
          - entity: binary_sensor.kitchen_door_tamper
            name: Kitchen Door
          - entity: binary_sensor.bedroom_door_tamper
            name: Bedroom Door
          - entity: binary_sensor.bedroom_window_tamper
            name: Bedroom Window
          - entity: binary_sensor.bedroom2_window_tamper
            name: Bedroom 2 Window
          - entity: binary_sensor.dressing_window_tamper
            name: Dressing Window
          - entity: binary_sensor.hallway_tamper
            name: Hallway
          - entity: binary_sensor.dining_tamper
            name: Living
          - entity: binary_sensor.keypad_tamper
            name: Keypad

      # ─── Device Connectivity ───
      - type: entities
        title: Device Connectivity
        icon: mdi:access-point-network
        show_header_toggle: false
        entities:
          - entity: binary_sensor.main_door_connectivity
            name: Main Door
          - entity: binary_sensor.kitchen_door_connectivity
            name: Kitchen Door
          - entity: binary_sensor.bedroom_door_connectivity
            name: Bedroom Door
          - entity: binary_sensor.bedroom_window_connectivity
            name: Bedroom Window
          - entity: binary_sensor.bedroom2_window_connectivity
            name: Bedroom 2 Window
          - entity: binary_sensor.dressing_window_connectivity
            name: Dressing Window
          - entity: binary_sensor.hallway_connectivity
            name: Hallway
          - entity: binary_sensor.dining_connectivity
            name: Living
          - entity: binary_sensor.keypad_connectivity
            name: Keypad

      # ─── Problems ───
      - type: entities
        title: Active Problems
        icon: mdi:alert-circle
        show_header_toggle: false
        entities:
          - entity: binary_sensor.my_hub_problem
            name: Hub
          - entity: binary_sensor.main_door_problem
            name: Main Door
          - entity: binary_sensor.kitchen_door_problem
            name: Kitchen Door
          - entity: binary_sensor.bedroom_door_problem
            name: Bedroom Door
          - entity: binary_sensor.bedroom_window_problem
            name: Bedroom Window
          - entity: binary_sensor.bedroom2_window_problem
            name: Bedroom 2 Window
          - entity: binary_sensor.dressing_window_problem
            name: Dressing Window
          - entity: binary_sensor.hallway_problem
            name: Hallway
          - entity: binary_sensor.dining_problem
            name: Living
          - entity: binary_sensor.keypad_problem
            name: Keypad

  # ═══════════════════════════════════════════════════════════════════════════
  # SECTION 6: Event History
  # ═══════════════════════════════════════════════════════════════════════════
  - title: History
    cards:
      # ─── Alarm State History ───
      - type: history-graph
        title: Alarm State (48h)
        hours_to_show: 48
        entities:
          - entity: alarm_control_panel.my_hub
            name: Alarm

      # ─── Door Activity History ───
      - type: history-graph
        title: Door Activity (24h)
        hours_to_show: 24
        entities:
          - entity: binary_sensor.main_door_door
            name: Main Door
          - entity: binary_sensor.kitchen_door_door
            name: Kitchen
          - entity: binary_sensor.bedroom_door_door
            name: Bedroom

      # ─── Window Activity History ───
      - type: history-graph
        title: Window Activity (24h)
        hours_to_show: 24
        entities:
          - entity: binary_sensor.bedroom_window_door
            name: Bedroom Window
          - entity: binary_sensor.bedroom2_window_door
            name: Bedroom 2 Window
          - entity: binary_sensor.dressing_window_door
            name: Dressing Window

      # ─── Motion History ───
      - type: history-graph
        title: Motion Detected (24h)
        hours_to_show: 24
        entities:
          - entity: binary_sensor.hallway_motion
            name: Hallway
          - entity: binary_sensor.dining_motion
            name: Living

      # ─── Hub Connectivity History ───
      - type: history-graph
        title: Hub Connectivity (7d)
        hours_to_show: 168
        entities:
          - entity: binary_sensor.my_hub_connectivity
            name: Hub Online
          - entity: binary_sensor.my_hub_cra_connection
            name: CRA
          - entity: binary_sensor.my_hub_cellular_connected
            name: Cellular
          - entity: binary_sensor.my_hub_ethernet
            name: Ethernet
          - entity: binary_sensor.my_hub_wifi_connected
            name: Wi-Fi
          - entity: binary_sensor.my_hub_mains_power
            name: Mains Power
