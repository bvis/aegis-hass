###############################################################################
# Aegis for Ajax — Home Assistant Automations
#
# Entity naming convention (based on aegis_ajax integration):
#   alarm_control_panel.my_hub
#   binary_sensor.<device_slug>_<sensor_type>
#   sensor.<device_slug>_<sensor_type>
#   button.<device_slug>_capture_photo
#   camera.<device_slug>
#
# Device slugs:
#   kitchen_door, bedroom_door, main_door, bedroom_window, bedroom2_window, dressing_window
#   hallway, dining, keypad, my_hub (hub)
#
# Requires: a notification service (notify.mobile_app_xxx or notify.notify)
#           Adjust "notify.mobile_app_user" to your actual service.
###############################################################################

# ─────────────────────────────────────────────────────────────────────────────
# 1. ALARM TRIGGERED — Critical push + camera capture
# ─────────────────────────────────────────────────────────────────────────────
# TIP: Instead of listing camera buttons manually, use label_entities:
#   entity_id: "{{ label_entities('aegis_camera') | select('match', 'button\\\\.') | list }}"
- id: ajax_alarm_triggered
  alias: "Alarm — System triggered"
  description: "Alert and capture photos when the alarm is triggered"
  triggers:
    - trigger: state
      entity_id: alarm_control_panel.my_hub
      not_from:
        - "unavailable"
        - "unknown"
      to: "triggered"
  actions:
    - action: button.press
      target:
        entity_id: "{{ label_entities('aegis_camera') | select('match', 'button\\\\.') | list }}"
    - action: notify.mobile_app_user
      data:
        title: "ALARM TRIGGERED!"
        message: >-
          The alarm system has been triggered.
          Previous state: {{ trigger.from_state.state }}
        data:
          push:
            sound:
              name: default
              critical: 1
              volume: 1.0
          tag: alarm-triggered
          priority: high
          ttl: 0

# ─────────────────────────────────────────────────────────────────────────────
# 2. ALARM STATE CHANGES — Notify on arm/disarm/night
# ─────────────────────────────────────────────────────────────────────────────
- id: ajax_alarm_state_change
  alias: "Alarm — State change"
  description: "Notify when alarm is armed, disarmed, or set to night mode"
  triggers:
    - trigger: state
      entity_id: alarm_control_panel.my_hub
      not_from:
        - "unavailable"
        - "unknown"
      to:
        - "armed_away"
        - "armed_night"
        - "armed_home"
        - "disarmed"
  conditions:
    - condition: template
      value_template: "{{ trigger.from_state.state != trigger.to_state.state }}"
  actions:
    - action: notify.mobile_app_user
      data:
        title: "Ajax Alarm"
        message: >-
          {% set states_map = {
            'armed_away': 'Armed (away)',
            'armed_night': 'Night mode',
            'armed_home': 'Armed (home)',
            'disarmed': 'Disarmed'
          } %}
          State: {{ states_map.get(states('alarm_control_panel.my_hub'), 'Unknown') }}

# ─────────────────────────────────────────────────────────────────────────────
# 3. HUB OFFLINE — Alert when hub loses connectivity
# ─────────────────────────────────────────────────────────────────────────────
- id: ajax_hub_offline
  alias: "Alarm — Hub disconnected"
  description: "Alert when the Ajax hub goes offline"
  triggers:
    - trigger: state
      entity_id: binary_sensor.my_hub_connectivity
      not_from:
        - "unavailable"
        - "unknown"
      to: "off"
      for:
        minutes: 2
  actions:
    - action: notify.mobile_app_user
      data:
        title: "ALARM — Hub Offline!"
        message: >-
          The Ajax hub has lost connection for more than 2 minutes.
          Check the internet connection and power supply.
        data:
          push:
            sound:
              name: default
              critical: 1
              volume: 0.8
          tag: hub-offline
          priority: high
          ttl: 0

# ─────────────────────────────────────────────────────────────────────────────
# 4. HUB BACK ONLINE
# ─────────────────────────────────────────────────────────────────────────────
- id: ajax_hub_back_online
  alias: "Alarm — Hub reconnected"
  description: "Notify when hub connectivity is restored"
  triggers:
    - trigger: state
      entity_id: binary_sensor.my_hub_connectivity
      not_from:
        - "unavailable"
        - "unknown"
      to: "on"
  conditions:
    - condition: template
      value_template: "{{ trigger.from_state.state == 'off' }}"
  actions:
    - action: notify.mobile_app_user
      data:
        title: "Ajax Alarm"
        message: "The hub has recovered connection."
        data:
          tag: hub-offline

# ─────────────────────────────────────────────────────────────────────────────
# 5. LOW BATTERY on any device
# ─────────────────────────────────────────────────────────────────────────────
# TIP: Use label_entities('aegis_battery') to auto-detect all battery sensors
#   instead of maintaining a manual list. New devices are included automatically.
- id: ajax_low_battery
  alias: "Alarm — Low battery"
  description: "Alert when any Ajax device battery drops below 15%"
  triggers:
    - trigger: numeric_state
      entity_id: "{{ label_entities('aegis_battery') | list }}"
      below: 15
  actions:
    - action: notify.mobile_app_user
      data:
        title: "Alarm — Low battery"
        message: >-
          {{ trigger.to_state.attributes.friendly_name }}: {{ trigger.to_state.state }}%
        data:
          tag: "battery-low-{{ trigger.entity_id }}"

# ─────────────────────────────────────────────────────────────────────────────
# 6. CRITICAL BATTERY (below 5%)
# ─────────────────────────────────────────────────────────────────────────────
- id: ajax_critical_battery
  alias: "Alarm — Critical battery"
  description: "Critical alert when any device battery is below 5%"
  triggers:
    - trigger: numeric_state
      entity_id: "{{ label_entities('aegis_battery') | list }}"
      below: 5
  actions:
    - action: notify.mobile_app_user
      data:
        title: "CRITICAL BATTERY!"
        message: >-
          {{ trigger.to_state.attributes.friendly_name }}: {{ trigger.to_state.state }}% — Replace immediately!
        data:
          push:
            sound:
              name: default
              critical: 1
              volume: 0.8
          tag: "battery-critical-{{ trigger.entity_id }}"

# ─────────────────────────────────────────────────────────────────────────────
# 7. DOOR/WINDOW LEFT OPEN too long
# ─────────────────────────────────────────────────────────────────────────────
# TIP: Use label_entities('aegis_door') to auto-detect all door/window sensors.
- id: ajax_door_left_open
  alias: "Alarm — Door/window open too long"
  description: "Alert when a door or window has been open for more than 10 minutes"
  triggers:
    - trigger: state
      entity_id: "{{ label_entities('aegis_door') | list }}"
      not_from:
        - "unavailable"
        - "unknown"
      to: "on"
      for:
        minutes: 10
  actions:
    - action: notify.mobile_app_user
      data:
        title: "Door/window open"
        message: >-
          {{ trigger.to_state.attributes.friendly_name }} has been open for more than 10 minutes.
        data:
          tag: "door-open-{{ trigger.entity_id }}"

# ─────────────────────────────────────────────────────────────────────────────
# 8. MAIN DOOR opens while alarm is armed (nobody home)
# ─────────────────────────────────────────────────────────────────────────────
- id: ajax_main_door_opens_armed
  alias: "Alarm — Main door opened while armed"
  description: "Alert if main door opens while system is armed (away)"
  triggers:
    - trigger: state
      entity_id: binary_sensor.main_door_door
      not_from:
        - "unavailable"
        - "unknown"
      to: "on"
  conditions:
    - condition: state
      entity_id: alarm_control_panel.my_hub
      state: "armed_away"
  actions:
    # TIP: Auto-detect capture buttons via aegis_camera label
    - action: button.press
      target:
        entity_id: "{{ label_entities('aegis_camera') | select('match', 'button\\\\.') | list }}"
    - action: notify.mobile_app_user
      data:
        title: "ALERT — Main door opened!"
        message: >-
          The main door was opened while the alarm was armed.
          Photos have been captured from the cameras.
        data:
          push:
            sound:
              name: default
              critical: 1
              volume: 1.0
          tag: main-door-armed
          priority: high
          ttl: 0

# ─────────────────────────────────────────────────────────────────────────────
# 9. TAMPER ALERT on any device
# ─────────────────────────────────────────────────────────────────────────────
# TIP: Use label_entities('aegis_tamper') to auto-detect all tamper sensors.
- id: ajax_tamper_alert
  alias: "Alarm — Tamper detected"
  description: "Alert when tamper is detected on any Ajax device"
  triggers:
    - trigger: state
      entity_id: "{{ label_entities('aegis_tamper') | list }}"
      not_from:
        - "unavailable"
        - "unknown"
      to: "on"
  actions:
    - action: notify.mobile_app_user
      data:
        title: "ALERT — Tamper!"
        message: >-
          Tamper detected on: {{ trigger.to_state.attributes.friendly_name }}
        data:
          push:
            sound:
              name: default
              critical: 1
              volume: 1.0
          tag: "tamper-{{ trigger.entity_id }}"
          priority: high
          ttl: 0

# ─────────────────────────────────────────────────────────────────────────────
# 10. HUB LID OPENED (physical tamper)
# ─────────────────────────────────────────────────────────────────────────────
- id: ajax_hub_lid_opened
  alias: "Alarm — Hub lid opened"
  description: "Alert when the hub lid/enclosure is opened"
  triggers:
    - trigger: state
      entity_id: binary_sensor.my_hub_lid_opened
      not_from:
        - "unavailable"
        - "unknown"
      to: "on"
  actions:
    - action: notify.mobile_app_user
      data:
        title: "ALERT — Hub lid opened!"
        message: >-
          The Ajax hub enclosure has been opened. Possible tamper attempt.
        data:
          push:
            sound:
              name: default
              critical: 1
              volume: 1.0
          tag: hub-lid-tamper
          priority: high
          ttl: 0

# ─────────────────────────────────────────────────────────────────────────────
# 11. CRA MONITORING DISCONNECTED
# ─────────────────────────────────────────────────────────────────────────────
- id: ajax_cra_disconnected
  alias: "Alarm — Monitoring station disconnected"
  description: "Alert when CRA (monitoring station) connection is lost"
  triggers:
    - trigger: state
      entity_id: binary_sensor.my_hub_cra_connection
      not_from:
        - "unavailable"
        - "unknown"
      to: "off"
      for:
        minutes: 1
  actions:
    - action: notify.mobile_app_user
      data:
        title: "ALERT — Monitoring station disconnected!"
        message: >-
          The connection with the monitoring station (CRA) has been lost.
          Contact your security provider if it is not restored shortly.
        data:
          push:
            sound:
              name: default
              critical: 1
              volume: 0.8
          tag: cra-disconnected
          priority: high
          ttl: 0

# ─────────────────────────────────────────────────────────────────────────────
# 12. CRA MONITORING RESTORED
# ─────────────────────────────────────────────────────────────────────────────
- id: ajax_cra_restored
  alias: "Alarm — Monitoring station restored"
  description: "Notify when CRA monitoring connection is restored"
  triggers:
    - trigger: state
      entity_id: binary_sensor.my_hub_cra_connection
      not_from:
        - "unavailable"
        - "unknown"
      to: "on"
  conditions:
    - condition: template
      value_template: "{{ trigger.from_state.state == 'off' }}"
  actions:
    - action: notify.mobile_app_user
      data:
        title: "Ajax Alarm"
        message: "Connection with the monitoring station (CRA) restored successfully."
        data:
          tag: cra-disconnected

# ─────────────────────────────────────────────────────────────────────────────
# 13. CELLULAR CONNECTION LOST
# ─────────────────────────────────────────────────────────────────────────────
- id: ajax_cellular_disconnected
  alias: "Alarm — Cellular connection lost"
  description: "Alert when hub loses cellular/4G connection"
  triggers:
    - trigger: state
      entity_id: binary_sensor.my_hub_cellular_connected
      not_from:
        - "unavailable"
        - "unknown"
      to: "off"
      for:
        minutes: 5
  actions:
    - action: notify.mobile_app_user
      data:
        title: "Alarm — 4G connection lost"
        message: >-
          The hub has lost cellular connection (4G) for more than 5 minutes.
          This may affect communication with the monitoring station.
        data:
          tag: cellular-disconnected
          priority: high

# ─────────────────────────────────────────────────────────────────────────────
# 14. TEMPERATURE ANOMALY (high)
# ─────────────────────────────────────────────────────────────────────────────
# TIP: Use label_entities('aegis_temperature') to auto-detect all temp sensors.
- id: ajax_temperature_high
  alias: "Alarm — High temperature"
  description: "Alert when any sensor detects temperature above 40C"
  triggers:
    - trigger: numeric_state
      entity_id: "{{ label_entities('aegis_temperature') | list }}"
      above: 40
  actions:
    - action: notify.mobile_app_user
      data:
        title: "ALERT — High temperature!"
        message: >-
          {{ trigger.to_state.attributes.friendly_name }}: {{ trigger.to_state.state }}°C
          Abnormally high temperature detected.
        data:
          push:
            sound:
              name: default
              critical: 1
              volume: 0.8
          tag: "temp-high-{{ trigger.entity_id }}"
          priority: high

# ─────────────────────────────────────────────────────────────────────────────
# 15. TEMPERATURE ANOMALY (low — possible heating failure)
# ─────────────────────────────────────────────────────────────────────────────
- id: ajax_temperature_low
  alias: "Alarm — Low temperature"
  description: "Alert when temperature drops below 5C (possible heating failure or break-in)"
  triggers:
    - trigger: numeric_state
      entity_id: "{{ label_entities('aegis_temperature') | list }}"
      below: 5
  actions:
    - action: notify.mobile_app_user
      data:
        title: "Alarm — Low temperature"
        message: >-
          {{ trigger.to_state.attributes.friendly_name }}: {{ trigger.to_state.state }}°C
          Very low temperature — check the heating.
        data:
          tag: "temp-low-{{ trigger.entity_id }}"

# ─────────────────────────────────────────────────────────────────────────────
# 16. AUTO-ARM at night (23:00)
# ─────────────────────────────────────────────────────────────────────────────
- id: ajax_auto_arm_night
  alias: "Alarm — Auto-arm at night"
  description: "Automatically arm in night mode at 23:00 if currently disarmed"
  triggers:
    - trigger: time
      at: "23:00:00"
  conditions:
    - condition: state
      entity_id: alarm_control_panel.my_hub
      state: "disarmed"
  actions:
    - action: alarm_control_panel.alarm_arm_night
      target:
        entity_id: alarm_control_panel.my_hub
    - action: notify.mobile_app_user
      data:
        title: "Ajax Alarm"
        message: "Night mode armed automatically (23:00)."

# ─────────────────────────────────────────────────────────────────────────────
# 17. AUTO-ARM when everyone leaves
# ─────────────────────────────────────────────────────────────────────────────
- id: ajax_auto_arm_away
  alias: "Alarm — Arm when everyone leaves"
  description: "Auto-arm when everyone leaves home (uses zone.home person tracking)"
  triggers:
    - trigger: state
      entity_id: zone.home
      not_from:
        - "unavailable"
        - "unknown"
      to: "0"
      for:
        minutes: 5
  conditions:
    - condition: state
      entity_id: alarm_control_panel.my_hub
      state: "disarmed"
  actions:
    - action: alarm_control_panel.alarm_arm_away
      target:
        entity_id: alarm_control_panel.my_hub
    - action: notify.mobile_app_user
      data:
        title: "Ajax Alarm"
        message: "Alarm armed automatically — everyone has left home."

# ─────────────────────────────────────────────────────────────────────────────
# 18. AUTO-DISARM when arriving home
# ─────────────────────────────────────────────────────────────────────────────
- id: ajax_auto_disarm_arrive
  alias: "Alarm — Disarm on arrival home"
  description: "Auto-disarm when the first person arrives home"
  triggers:
    - trigger: state
      entity_id: zone.home
      from: "0"
  conditions:
    - condition: state
      entity_id: alarm_control_panel.my_hub
      state:
        - "armed_away"
        - "armed_night"
  actions:
    - action: alarm_control_panel.alarm_disarm
      target:
        entity_id: alarm_control_panel.my_hub
    - action: notify.mobile_app_user
      data:
        title: "Ajax Alarm"
        message: "Alarm disarmed — welcome home."

# ─────────────────────────────────────────────────────────────────────────────
# 19. SENSOR OFFLINE — any device loses connectivity
# ─────────────────────────────────────────────────────────────────────────────
# TIP: Use label_entities('aegis_connectivity') to auto-detect all connectivity sensors.
- id: ajax_sensor_offline
  alias: "Alarm — Sensor offline"
  description: "Alert when any Ajax sensor goes offline"
  triggers:
    - trigger: state
      entity_id: "{{ label_entities('aegis_connectivity') | list }}"
      not_from:
        - "unavailable"
        - "unknown"
      to: "off"
      for:
        minutes: 10
  actions:
    - action: notify.mobile_app_user
      data:
        title: "Alarm — Sensor offline"
        message: >-
          {{ trigger.to_state.attributes.friendly_name }} has lost connection for more than 10 minutes.
        data:
          tag: "sensor-offline-{{ trigger.entity_id }}"

# ─────────────────────────────────────────────────────────────────────────────
# 20. PROBLEM DETECTED on any device
# ─────────────────────────────────────────────────────────────────────────────
- id: ajax_device_problem
  alias: "Alarm — Device problem"
  description: "Alert when any device reports a problem/malfunction"
  triggers:
    - trigger: state
      entity_id:
        - binary_sensor.kitchen_door_problem
        - binary_sensor.bedroom_door_problem
        - binary_sensor.main_door_problem
        - binary_sensor.bedroom_window_problem
        - binary_sensor.bedroom2_window_problem
        - binary_sensor.dressing_window_problem
        - binary_sensor.hallway_problem
        - binary_sensor.dining_problem
        - binary_sensor.keypad_problem
        - binary_sensor.my_hub_problem
      not_from:
        - "unavailable"
        - "unknown"
      to: "on"
  actions:
    - action: notify.mobile_app_user
      data:
        title: "Alarm — Problem detected"
        message: >-
          Problem detected on: {{ trigger.to_state.attributes.friendly_name }}
          {% if trigger.to_state.attributes.malfunctions_count is defined %}
          Number of problems: {{ trigger.to_state.attributes.malfunctions_count }}
          {% endif %}
        data:
          tag: "problem-{{ trigger.entity_id }}"

# ─────────────────────────────────────────────────────────────────────────────
# 21. REMINDER: Check open doors/windows before arming at night
# ─────────────────────────────────────────────────────────────────────────────
# Uses label_entities('aegis_door') to auto-detect all door/window sensors.
# New devices added to the integration are included automatically.
- id: ajax_open_check_before_night
  alias: "Alarm — Open doors reminder at night"
  description: "Reminder at 22:30 if any doors/windows are open"
  triggers:
    - trigger: time
      at: "22:30:00"
  conditions:
    - condition: template
      value_template: >-
        {{ label_entities('aegis_door')
           | select('is_state', 'on') | list | length > 0 }}
  actions:
    - action: notify.mobile_app_user
      data:
        title: "Reminder — Open doors"
        message: >-
          Before going to bed, check:
          {% for entity in label_entities('aegis_door') %}
          {% if is_state(entity, 'on') %}
          - {{ state_attr(entity, 'friendly_name') }}: OPEN
          {% endif %}
          {% endfor %}

# ─────────────────────────────────────────────────────────────────────────────
# 22. SECURITY EVENT — Notify with device details
# ─────────────────────────────────────────────────────────────────────────────
# Uses the enriched event data (device_name, device_type, room_name) to send
# detailed notifications about any security event.

- alias: "Security event — detailed notification"
  id: security_event_detailed_notification
  trigger:
    - trigger: state
      entity_id: event.my_hub_security_event
  condition:
    - condition: template
      value_template: "{{ trigger.to_state.attributes.event_type is defined }}"
  action:
    - action: notify.mobile_app_user
      data:
        title: "Security: {{ trigger.to_state.attributes.event_type | replace('_', ' ') | title }}"
        message: >-
          {% set attrs = trigger.to_state.attributes %}
          {{ attrs.get('device_name', 'Unknown device') }}
          {% if attrs.get('room_name') %} ({{ attrs.room_name }}){% endif %}
          — {{ attrs.event_type | replace('_', ' ') }}
          {% if attrs.get('device_type') %}[{{ attrs.device_type }}]{% endif %}
        data:
          push:
            sound: default
          url: /lovelace/seguridad

# ─────────────────────────────────────────────────────────────────────────────
# 23. INTRUSION ALARM — Camera capture + rich notification
# ─────────────────────────────────────────────────────────────────────────────
# When an intrusion alarm fires, capture photos from all cameras and notify
# with the name of the device that detected the intrusion.

- alias: "Intrusion alarm — capture + notify"
  id: intrusion_alarm_capture_notify
  trigger:
    - trigger: state
      entity_id: event.my_hub_security_event
      attribute: event_type
      not_from:
        - "unavailable"
        - "unknown"
      to: "alarm"
  action:
    - parallel:
        # Auto-detect all capture buttons via aegis_camera label
        - action: button.press
          target:
            entity_id: "{{ label_entities('aegis_camera') | select('match', 'button\\\\.') | list }}"
        - action: notify.mobile_app_user
          data:
            title: "INTRUSION ALARM"
            message: >-
              Alarm triggered by {{ trigger.to_state.attributes.get('device_name', 'unknown') }}
              {% if trigger.to_state.attributes.get('room_name') %}
              in {{ trigger.to_state.attributes.room_name }}
              {% endif %}
            data:
              push:
                sound:
                  name: default
                  critical: 1
              url: /lovelace/seguridad

# ─────────────────────────────────────────────────────────────────────────────
# 24. TAMPER DETECTION — Immediate alert
# ─────────────────────────────────────────────────────────────────────────────
# Someone is physically tampering with a device. Include which device.

- alias: "Tamper — alert with device name"
  id: tamper_alert_device_name
  trigger:
    - trigger: state
      entity_id: event.my_hub_security_event
      attribute: event_type
      not_from:
        - "unavailable"
        - "unknown"
      to: "tamper"
  action:
    - action: notify.mobile_app_user
      data:
        title: "TAMPER ALERT"
        message: >-
          Device tampered: {{ trigger.to_state.attributes.get('device_name', 'unknown') }}
          ({{ trigger.to_state.attributes.get('device_type', '') | replace('_', ' ') | lower }})
        data:
          push:
            sound:
              name: default
              critical: 1
