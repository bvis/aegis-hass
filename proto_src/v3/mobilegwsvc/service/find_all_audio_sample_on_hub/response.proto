syntax = "proto3";

package systems.ajax.api.ecosystem.v3.mobilegwsvc.service.find_all_audio_sample_on_hub;

import "google/protobuf/duration.proto";
import "google/protobuf/timestamp.proto";
import "v3/mobilegwsvc/commonmodels/response/response.proto";
import "v3/mobilegwsvc/commonmodels/resource/audio/audio_format.proto";

option java_package = "systems.ajax.api.ecosystem.v3.mobilegwsvc.service.find_all_audio_sample_on_hub";
option java_multiple_files = true;
option swift_prefix = "";

message FindAllAudioSampleOnHubResponse {

  oneof response {
    Success success = 1;
    Failure failure = 2;
  }

  message Success {
    repeated AudioFile audio_files = 1;
  }

  message AudioFile {
    string id = 1;                                                              // identifier on file-svc
    uint32 audio_file_index = 2;                                                // (index/slot) on hub. Used for sample play (0x30) command
    string filename = 3;                                                        // audio file name
    v3.mobilegwsvc.commonmodels.resource.audio.AudioFormat audio_format = 4;    // Format of the audio file (as for now always AUDIO_FORMAT_MP3)
    google.protobuf.Duration duration = 5;                                      // Audio file duration, alternatively we can send iso string of duration
    google.protobuf.Timestamp expiration_time = 6;                              // When the link expires
    string url = 7;                                                             // Full (pre-signed) url to the audio file
  }

  message Failure {
    oneof error {
      commonmodels.Error bad_request = 1;
      commonmodels.Error permission_denied = 2;
    }
  }
}
