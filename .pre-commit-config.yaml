repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
        name: Detect hardcoded secrets (gitleaks)
        stages: [pre-commit]

  - repo: local
    hooks:
      - id: check
        name: Full check (lint + typecheck + test)
        entry: make check
        language: system
        pass_filenames: false
        stages: [pre-push]
