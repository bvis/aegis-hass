name: CI

on:
  push:
    branches: [main, "feat/**"]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Build dev container
        run: docker build -f Dockerfile.dev --build-arg PYTHON_VERSION=${{ matrix.python-version }} -t aegis-ajax-dev .
      - name: Run tests
        run: |
          mkdir -p coverage
          docker run --rm -v "$(pwd)/coverage:/coverage" aegis-ajax-dev \
            pytest tests/unit/ -v \
              --cov=custom_components/aegis_ajax \
              --cov-fail-under=80 \
              --cov-report=term-missing \
              --cov-report=json:/coverage/coverage.json
      - name: Coverage summary
        if: matrix.python-version == '3.12'
        run: |
          python3 -c "
          import json
          with open('coverage/coverage.json') as f:
              data = json.load(f)
          pct = data['totals']['percent_covered_display']
          stmts = data['totals']['num_statements']
          miss = data['totals']['missing_lines']
          print('## Test Coverage')
          print(f'| Metric | Value |')
          print(f'|--------|-------|')
          print(f'| **Coverage** | **{pct}%** |')
          print(f'| Statements | {stmts} |')
          print(f'| Missing | {miss} |')
          " >> "$GITHUB_STEP_SUMMARY"

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Build dev container
        run: docker build -f Dockerfile.dev -t aegis-ajax-dev .
      - name: Run linter
        run: docker run --rm aegis-ajax-dev ruff check .

  format-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Build dev container
        run: docker build -f Dockerfile.dev -t aegis-ajax-dev .
      - name: Check formatting
        run: docker run --rm aegis-ajax-dev ruff format --check .

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Build dev container
        run: docker build -f Dockerfile.dev -t aegis-ajax-dev .
      - name: Run type checker
        run: docker run --rm aegis-ajax-dev mypy custom_components/aegis_ajax/ --ignore-missing-imports --exclude 'proto/'

  dead-code:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Build dev container
        run: docker build -f Dockerfile.dev -t aegis-ajax-dev .
      - name: Run dead code analysis
        run: docker run --rm aegis-ajax-dev vulture custom_components/aegis_ajax/ vulture_whitelist.py --exclude custom_components/aegis_ajax/proto/

