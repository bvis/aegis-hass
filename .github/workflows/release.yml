name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Determine pre-release
        id: prerelease
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if echo "$TAG_NAME" | grep -qE 'alpha|beta|rc|preview'; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract changelog for this version
        id: changelog
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${TAG_NAME#v}"
          # Beta tags (v1.9.0-beta.6) map to the base section `## [1.9.0]`
          # in CHANGELOG.md, which carries the `- unreleased` heading while
          # the beta series is in flight. Strip the pre-release suffix so the
          # release notes pick up that section instead of falling back to a
          # bare one-liner.
          BASE_VERSION="${VERSION%%-*}"
          NOTES=$(awk "/^## \[${BASE_VERSION}\]/{found=1; next} /^## \[/{if(found) exit} found{print}" CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="Release ${TAG_NAME}"
          fi
          {
            echo "notes<<CHANGELOG_EOF"
            echo "$NOTES"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          prerelease: ${{ steps.prerelease.outputs.is_prerelease }}
          body: ${{ steps.changelog.outputs.notes }}
