name: Update version dropdown

# Keeps the bug-report issue form's "Integration version" dropdown in sync with
# published releases, so reporters can only pick a version that actually exists
# (kills phantom values like a mistyped "2.0.5"). The list is regenerated from
# `gh release list` between the AUTOGENERATED sentinels in bug_report.yml.

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-version-dropdown
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Refresh integration-version options
        env:
          GH_TOKEN: ${{ github.token }}
        run: python3 .github/scripts/update_version_dropdown.py

      - name: Commit if changed
        run: |
          if git diff --quiet .github/ISSUE_TEMPLATE/bug_report.yml; then
            echo "No change to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/ISSUE_TEMPLATE/bug_report.yml
          git commit -m "chore: refresh issue-form version dropdown [skip ci]"
          git push
